    function setFileMeta(file) {
      if (!file) {
        fileMetaChip.classList.add('hidden');
        fileName.textContent = '';
        selectedFileName.textContent = '';
        return;
      }
      fileMetaChip.classList.remove('hidden');
      fileName.textContent = file.name;
      selectedFileName.textContent = file.name;
    }

    function updateUploadPanelState() {
      const hasFile = Boolean(selectedFile);
      uploadHeading.classList.toggle('hidden', hasFile);
      uploadArea.classList.toggle('hidden', hasFile);
      uploadAltActions.classList.toggle('hidden', hasFile);
      selectedFileBar.classList.toggle('hidden', !hasFile);
    }

    function setFeedback(type, message) {
      if (!message) {
        errorMsg.classList.add('hidden');
        errorMsg.textContent = '';
        errorMsg.classList.remove('feedback-banner--success', 'feedback-banner--danger');
        return;
      }
      errorMsg.textContent = message;
      errorMsg.classList.remove('hidden', 'feedback-banner--success', 'feedback-banner--danger');
      errorMsg.classList.add(type === 'success' ? 'feedback-banner--success' : 'feedback-banner--danger');
    }

    function showSuccess(message) {
      setFeedback('success', message);
    }

    function showError(message) {
      setFeedback('danger', message);
    }

    function renderInfoCard(label, value) {
      return `\n        <div class="info-card">\n          <div class="info-label">${escapeHtml(label)}</div>\n          <div class="info-value">${escapeHtml(value)}</div>\n        </div>\n      `;
    }

    function renderStatusChip(type, icon, text) {
      return `\n        <span class="status-chip status-chip--${type}">\n          <i class="bi ${icon}"></i>\n          ${escapeHtml(text)}\n        </span>\n      `;
    }

    function translateStepName(step, fallbackName) {
      return fallbackName || t(`steps.${step}`) || step;
    }

    function renderStepItem(type, iconHtml, name, meta = '') {
      return `\n        <div class="step-item">\n          <span class="step-icon step-icon--${type}">${iconHtml}</span>\n          <span class="step-item__name">${escapeHtml(name)}</span>\n          <span class="step-item__meta">${escapeHtml(meta)}</span>\n        </div>\n      `;
    }

    function getCurrentTriangleCount() {
      return Number(modelAnalysis?.meshes?.totalTriangles || 0);
    }

    function normalizeFaceCountValue(value, { fallback = FACE_COUNT_MIN, snapToStep = true } = {}) {
      let normalized = parseInt(value, 10);
      if (!Number.isFinite(normalized) || normalized <= 0) {
        normalized = fallback;
      }
      normalized = Math.max(FACE_COUNT_MIN, normalized);
      if (snapToStep) {
        normalized = Math.max(FACE_COUNT_MIN, Math.round(normalized / FACE_COUNT_STEP) * FACE_COUNT_STEP);
      }
      return normalized;
    }

    function getRecommendedFaceCount(totalTriangles) {
      if (!totalTriangles) return FACE_COUNT_MIN;
      let recommended = 0;
      if (totalTriangles <= 10000) recommended = Math.round(totalTriangles * 0.8);
      else if (totalTriangles <= 50000) recommended = Math.round(totalTriangles * 0.6);
      else if (totalTriangles <= 150000) recommended = Math.round(totalTriangles * 0.45);
      else recommended = Math.round(totalTriangles * 0.35);
      return normalizeFaceCountValue(recommended);
    }

    function syncAutoOptimizationOptions({ commitValue = true } = {}) {
      const totalTriangles = getCurrentTriangleCount();
      if (!totalTriangles) {
        optimizeBtn.disabled = true;
        return;
      }

      const fallbackTargetFaces = getRecommendedFaceCount(totalTriangles);
      let targetFaces = parseInt(targetFaceCountInput.value, 10);
      if (!Number.isFinite(targetFaces) || targetFaces <= 0) {
        targetFaces = fallbackTargetFaces;
      }
      targetFaces = normalizeFaceCountValue(targetFaces, {
        fallback: fallbackTargetFaces,
        snapToStep: commitValue,
      });
      targetFaceCountInput.min = String(FACE_COUNT_MIN);
      targetFaceCountInput.step = String(FACE_COUNT_STEP);
      targetFaceCountInput.removeAttribute('max');
      if (commitValue) {
        targetFaceCountInput.value = String(targetFaces);
      }

      const ratio = Math.max(0.05, Math.min(1, targetFaces / totalTriangles));
      document.getElementById('cleanEnabled').checked = true;
      document.getElementById('removeUnusedNodes').checked = true;
      document.getElementById('removeUnusedMaterials').checked = true;
      document.getElementById('removeUnusedTextures').checked = true;
      document.getElementById('mergeEnabled').checked = Number(modelAnalysis?.meshes?.count || 0) > 1;
      document.getElementById('simplifyEnabled').checked = targetFaces < totalTriangles;
      document.getElementById('targetRatio').value = ratio.toFixed(3);
      document.getElementById('lockBorder').checked = true;
      document.getElementById('quantizeEnabled').checked = ratio <= 0.55;
      optimizeBtn.disabled = !selectedFile;
    }

    function resetViewerPlaceholders() {
      placeholderLeft.innerHTML = defaultLeftPlaceholder;
      placeholderRight.innerHTML = defaultRightPlaceholder;
      placeholderLeft.classList.remove('hidden');
      placeholderRight.classList.remove('hidden');
      document.getElementById('infoLeft').textContent = '';
      document.getElementById('infoRight').textContent = '';
    }

    function clearSelectedModel() {
      selectedFile = null;
      currentTaskId = null;
      modelAnalysis = null;
      uploadedResourceId = null;
      activePreset = null;
      fileInput.value = '';
      targetFaceCountInput.value = '';
      setFileMeta(null);
      updateUploadPanelState();
      resetAssetUploadButton();
      modelInfoSection.classList.add('hidden');
      optionsSection.classList.add('hidden');
      resultSection.classList.add('hidden');
      setFeedback('', '');
      optimizeBtn.disabled = true;
      document.getElementById('progressSteps').innerHTML = '';
      document.getElementById('stepsList').innerHTML = '';
      leftModel = clearModel(leftScene, leftModel);
      rightModel = clearModel(rightScene, rightModel);
      resetViewerPlaceholders();
      setViewMode('split');
    }

    function displayModelInfo(analysis) {
      document.getElementById('basicInfo').innerHTML = [
        renderInfoCard(t('modelInfo.fileSize'), formatSize(analysis.fileSize)),
        renderInfoCard(t('modelInfo.format'), analysis.format),
        renderInfoCard(t('modelInfo.faces'), Number(analysis.meshes.totalTriangles || 0).toLocaleString()),
        renderInfoCard(t('modelInfo.vertices'), Number(analysis.meshes.totalVertices || 0).toLocaleString()),
      ].join('');
      document.getElementById('summaryBadges').innerHTML = '';
      document.getElementById('meshInfo').innerHTML = '';
    }

    function updateHints(analysis) {
      return analysis;
    }

    document.querySelectorAll('.preset-btn').forEach((button) => {
      button.addEventListener('click', function() {
        const preset = this.dataset.preset;
        document.querySelectorAll('.preset-btn').forEach((item) => item.classList.remove('active'));
        if (activePreset === preset) {
          activePreset = null;
          presetDesc.textContent = t('preset.defaultHint');
          return;
        }
        activePreset = preset;
        this.classList.add('active');
        presetDesc.textContent = t(`preset.${preset}.desc`);
        const presetConfig = presetOptions[preset];
        document.getElementById('cleanEnabled').checked = presetConfig.clean;
        document.getElementById('mergeEnabled').checked = presetConfig.merge;
        document.getElementById('simplifyEnabled').checked = presetConfig.simplify;
        if (presetConfig.ratio) document.getElementById('targetRatio').value = presetConfig.ratio;
        document.getElementById('quantizeEnabled').checked = presetConfig.quantize;
      });
    });

    uploadArea.addEventListener('click', () => fileInput.click());
    uploadArea.addEventListener('dragover', (event) => {
      event.preventDefault();
      uploadArea.classList.add('dragover');
    });
    uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
    uploadArea.addEventListener('drop', (event) => {
      event.preventDefault();
      uploadArea.classList.remove('dragover');
      if (event.dataTransfer.files[0]) handleFile(event.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', (event) => {
      if (event.target.files[0]) handleFile(event.target.files[0]);
    });
    clearSelectedFileBtn.addEventListener('click', clearSelectedModel);
    pickLibraryModelBtn.addEventListener('click', () => {
      void selectModelFromLibrary();
    });
    openModelLibraryBtn.addEventListener('click', () => {
      void openModelLibrary();
    });
    targetFaceCountInput.addEventListener('input', () => {
      syncAutoOptimizationOptions({ commitValue: false });
    });
    targetFaceCountInput.addEventListener('change', () => {
      syncAutoOptimizationOptions({ commitValue: true });
    });
    targetFaceCountInput.addEventListener('blur', () => {
      syncAutoOptimizationOptions({ commitValue: true });
    });

    async function handleFile(file) {
      const ext = file.name.split('.').pop().toLowerCase();
      if (!['glb'].includes(ext)) {
        showError(t('messages.unsupportedFormat'));
        return;
      }
      if (file.size > 100 * 1024 * 1024) {
        showError(t('messages.fileTooLarge'));
        return;
      }

      selectedFile = file;
      currentTaskId = null;
      modelAnalysis = null;
      uploadedResourceId = null;
      setFileMeta(file);
      updateUploadPanelState();
      resetAssetUploadButton();
      modelInfoSection.classList.add('hidden');
      optionsSection.classList.add('hidden');
      resultSection.classList.add('hidden');
      setFeedback('', '');
      optimizeBtn.disabled = true;
      activePreset = null;
      targetFaceCountInput.value = '';
      document.getElementById('progressSteps').innerHTML = '';
      document.getElementById('stepsList').innerHTML = '';
      leftModel = clearModel(leftScene, leftModel);
      placeholderLeft.innerHTML = defaultLeftPlaceholder;
      placeholderLeft.classList.add('hidden');
      document.getElementById('infoLeft').textContent = '';
      rightModel = clearModel(rightScene, rightModel);
      placeholderRight.innerHTML = defaultRightPlaceholder;
      placeholderRight.classList.remove('hidden');
      document.getElementById('infoRight').textContent = '';

      const previewFormats = ['glb'];
      if (previewFormats.includes(ext)) {
        try {
          leftModel = await loadModelFromFile(file, leftScene, 'left');
          fitCamera(leftCamera, leftControls, leftModel);
          if (wireframeMode) toggleWireframe(leftModel, true);
        } catch (error) {
          console.warn('Preview not available:', error);
        }
      } else {
        document.getElementById('placeholderLeft').classList.remove('hidden');
        document.getElementById('placeholderLeft').innerHTML = `\n          <div class="viewer-placeholder__card">\n            <i class="bi bi-eye-slash"></i>\n            <p class="viewer-placeholder__title">${escapeHtml(ext.toUpperCase())}</p>\n          </div>\n        `;
      }

      await analyzeFile(file);
    }

    async function analyzeFile(file) {
      analyzeLoading.classList.add('show');
      const fd = new FormData();
      fd.append('file', file);
      try {
        const response = await fetch('/api/analyze', { method: 'POST', body: fd, headers: getAuthHeaders() });
        const data = await response.json();
        if (data.success) {
          modelAnalysis = data.analysis;
          displayModelInfo(data.analysis);
          modelInfoSection.classList.remove('hidden');
          optionsSection.classList.remove('hidden');
          targetFaceCountInput.value = String(getRecommendedFaceCount(getCurrentTriangleCount()));
          updateHints(data.analysis);
          syncAutoOptimizationOptions();
        } else {
          showError(t('messages.analyzeFailed', { message: data.error?.message || 'Unknown error' }));
        }
      } catch (error) {
        showError(t('messages.analyzeRequestFailed', { message: error.message }));
      } finally {
        analyzeLoading.classList.remove('show');
      }
    }

    optimizeBtn.addEventListener('click', async () => {
      if (!selectedFile) return;
      syncAutoOptimizationOptions({ commitValue: true });
      currentTaskId = null;
      uploadedResourceId = null;
      resetAssetUploadButton();
      loading.classList.add('show');
      setFeedback('', '');
      optimizeBtn.disabled = true;
      document.getElementById('progressSteps').innerHTML = '';
      loadingText.textContent = t('loading.optimizing');

      const fd = new FormData();
      fd.append('file', selectedFile);
      fd.append('options', JSON.stringify(getOptions()));

      try {
        const response = await fetch('/api/optimize/stream', { method: 'POST', body: fd, headers: getAuthHeaders() });
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        let finalResult = null;

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop() || '';
          let currentEvent = '';
          for (const line of lines) {
            if (line.startsWith('event: ')) currentEvent = line.slice(7);
            else if (line.startsWith('data: ')) {
              try {
                const data = JSON.parse(line.slice(6));
                if (currentEvent === 'progress') {
                  loadingText.textContent = t('loading.optimizing');
                } else if (currentEvent === 'result') {
                  finalResult = data;
                } else if (currentEvent === 'error') {
                  showError(t('messages.optimizeFailed', { message: data.message || 'Unknown error' }));
                }
              } catch (error) {}
            }
          }
        }

        if (finalResult && finalResult.success) {
          currentTaskId = finalResult.taskId;
          displayResult(finalResult);
          resultSection.classList.remove('hidden');
          rightModel = clearModel(rightScene, rightModel);
          document.getElementById('placeholderRight').classList.add('hidden');
          const downloadUrl = apiKey ? `/api/download/${finalResult.taskId}?api_key=${encodeURIComponent(apiKey)}` : `/api/download/${finalResult.taskId}`;
          try {
            rightModel = await loadModelFromUrl(downloadUrl, rightScene, 'right');
            fitCamera(rightCamera, rightControls, rightModel);
            updateResultFaceStats(rightModel?.userData?.meshStats?.faces ?? null);
            if (wireframeMode) toggleWireframe(rightModel, true);
            if (document.getElementById('syncCameras').checked && leftModel) {
              rightCamera.position.copy(leftCamera.position);
              rightCamera.rotation.copy(leftCamera.rotation);
              rightControls.target.copy(leftControls.target);
              rightControls.update();
            }
          } catch (error) {
            console.warn('Could not load optimized preview:', error);
            document.getElementById('placeholderRight').classList.remove('hidden');
            document.getElementById('placeholderRight').innerHTML = `\n              <div class="viewer-placeholder__card">\n                <i class="bi bi-exclamation-triangle"></i>\n                <p class="viewer-placeholder__title">GLB</p>\n              </div>\n            `;
          }
        } else if (finalResult) {
          showError(t('messages.optimizeFailed', { message: finalResult.error || 'Unknown error' }));
        }
      } catch (error) {
        showError(t('messages.requestFailed', { message: error.message }));
      } finally {
        loading.classList.remove('show');
        optimizeBtn.disabled = false;
        loadingText.textContent = t('loading.optimizing');
      }
    });

    function displayResult(data) {
      const originalSize = Number(data.originalSize || 0);
      const optimizedSize = Number(data.optimizedSize || 0);
      document.getElementById('originalSize').textContent = formatSize(originalSize);
      document.getElementById('optimizedSize').textContent = formatSize(optimizedSize);
      updateResultFaceStats(
        Number.isFinite(Number(data.optimizedFaces))
          ? Number(data.optimizedFaces)
          : null
      );
      document.getElementById('stepsList').innerHTML = '';
      resetAssetUploadButton();
    }

    function updateResultFaceStats(optimizedFaces = null) {
      const originalFaces = Number(modelAnalysis?.meshes?.totalTriangles || 0);
      const fallbackOptimizedFaces = parseInt(targetFaceCountInput.value, 10);
      const finalOptimizedFaces = Number.isFinite(Number(optimizedFaces)) && Number(optimizedFaces) > 0
        ? Number(optimizedFaces)
        : fallbackOptimizedFaces;

      document.getElementById('originalFaces').textContent = originalFaces > 0
        ? Math.round(originalFaces).toLocaleString()
        : '-';
      document.getElementById('optimizedFaces').textContent = Number.isFinite(Number(finalOptimizedFaces)) && Number(finalOptimizedFaces) > 0
        ? Math.round(finalOptimizedFaces).toLocaleString()
        : '-';
    }

    function roundNumber(value, digits = 5) {
      return Number(Number(value || 0).toFixed(digits));
    }

    function buildPolygenInfoFromModel(model) {
      if (!model) return undefined;
      const bounds = model.userData?.originalBounds;
      const size = bounds?.size || { x: 0, y: 0, z: 0 };
      const center = bounds?.center || { x: 0, y: 0, z: 0 };
      const animations = Array.isArray(model.userData?.animations)
        ? model.userData.animations.map((anim) => ({ name: anim.name, length: anim.duration }))
        : [];
      let faceCount = 0;
      model.traverse((child) => {
        if (child.isMesh && child.geometry) {
          const geometry = child.geometry;
          if (geometry.index) faceCount += geometry.index.count / 3;
          else if (geometry.attributes.position) faceCount += geometry.attributes.position.count / 3;
        }
      });
      return JSON.stringify({
        size: { x: roundNumber(size.x), y: roundNumber(size.y), z: roundNumber(size.z) },
        center: { x: roundNumber(center.x), y: roundNumber(center.y), z: roundNumber(center.z) },
        anim: animations,
        faces: Math.round(faceCount),
      });
    }

    async function fetchOptimizedModelFile() {
      if (!currentTaskId) throw new Error(t('messages.needOptimizeFirst'));
      const response = await fetch(getOptimizedDownloadPath(currentTaskId), { method: 'GET', headers: getAuthHeaders() });
      if (!response.ok) throw new Error(`${response.status}`);
      const blob = await response.blob();
      const originalName = (selectedFile?.name || 'optimized-model').replace(/\.[^/.]+$/, '');
      return new File([blob], `${originalName}-optimized.glb`, { type: 'model/gltf-binary', lastModified: Date.now() });
    }

    function setAssetUploadButtonLoading(isLoading, text = t('actions.uploadAsset')) {
      uploadAssetBtn.disabled = isLoading;
      uploadAssetBtn.innerHTML = isLoading
        ? `<span class="inline-spinner"></span><span>${escapeHtml(text)}</span>`
        : `<i class="bi bi-cloud-arrow-up-fill"></i><span>${escapeHtml(text)}</span>`;
    }

    function setAssetUploadButtonVisible(visible) {
      uploadAssetBtn.classList.toggle('hidden', !visible);
    }

    function resetAssetUploadButton() {
      setAssetUploadButtonLoading(false, t('actions.uploadAsset'));
      setAssetUploadButtonVisible(Boolean(currentTaskId) && !uploadedResourceId);
    }

    async function uploadOptimizedModelToAssetLibrary() {
      if (uploadedResourceId) {
        showSuccess(t('messages.uploadSuccess'));
        return;
      }
      if (!currentTaskId) {
        showError(t('messages.needOptimizeFirst'));
        return;
      }
      if (!window.parent || window.parent === window) {
        showError(t('messages.openFromPlatform'));
        return;
      }

      setAssetUploadButtonLoading(true, t('loading.optimizing'));
      setFeedback('', '');
      try {
        const optimizedFile = await fetchOptimizedModelFile();
        const info = buildPolygenInfoFromModel(rightModel);
        const hostResult = await requestHost(HOST_UPLOAD_ACTION, { resourceName: optimizedFile.name, optimizedFile, info });
        uploadedResourceId = hostResult?.resourceId ?? null;
        showSuccess(t('messages.uploadSuccess'));
        resetAssetUploadButton();
      } catch (error) {
        showError(t('messages.uploadFailed', { message: error.message }));
        setAssetUploadButtonLoading(false, t('actions.uploadAsset'));
        setAssetUploadButtonVisible(true);
      }
    }

    uploadAssetBtn.addEventListener('click', uploadOptimizedModelToAssetLibrary);

    function getOptimizedDownloadPath(taskId) {
      return apiKey ? `/api/download/${taskId}?api_key=${encodeURIComponent(apiKey)}` : `/api/download/${taskId}`;
    }

    function formatSize(bytes) {
      if (!bytes) return '0 B';
      if (bytes < 1024) return `${bytes} B`;
      if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
      return `${(bytes / (1024 * 1024)).toFixed(2)} MB`;
    }

    function getOptions() {
      const options = {};
      if (document.getElementById('cleanEnabled').checked) {
        options.clean = {
          enabled: true,
          removeUnusedNodes: document.getElementById('removeUnusedNodes').checked,
          removeUnusedMaterials: document.getElementById('removeUnusedMaterials').checked,
          removeUnusedTextures: document.getElementById('removeUnusedTextures').checked,
        };
      }
      if (document.getElementById('mergeEnabled').checked) options.merge = { enabled: true };
      if (document.getElementById('simplifyEnabled').checked) {
        options.simplify = {
          enabled: true,
          targetRatio: parseFloat(document.getElementById('targetRatio').value),
          lockBorder: document.getElementById('lockBorder').checked,
        };
      }
      if (document.getElementById('quantizeEnabled').checked) options.quantize = { enabled: true };
      return options;
    }

    sendPluginReady();
    applyTheme(currentTheme, currentDark);
    applyI18n(currentLang);
    checkAuth();
    initViewers();
    onResize();
  </script>
</body>
</html>
