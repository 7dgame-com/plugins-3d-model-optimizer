<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>三维模型优化服务</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <style>
    :root {
      --primary-color: #00baff;
      --primary-hover: #0099dd;
      --primary-light: rgba(0, 186, 255, 0.14);
      --text-primary: #1e293b;
      --text-secondary: #64748b;
      --text-muted: #94a3b8;
      --text-inverse: #ffffff;
      --bg-page: #eef3f8;
      --bg-page-gradient: radial-gradient(circle at top left, rgba(0, 186, 255, 0.12), transparent 32%);
      --bg-card: rgba(255, 255, 255, 0.94);
      --bg-card-solid: #ffffff;
      --bg-hover: #f8fafc;
      --bg-active: #e2e8f0;
      --bg-secondary: #f1f5f9;
      --bg-stage: #edf3f8;
      --border-color: #dbe5ef;
      --border-color-strong: #c4d2e3;
      --success-color: #22c55e;
      --success-light: rgba(34, 197, 94, 0.12);
      --warning-color: #f59e0b;
      --warning-light: rgba(245, 158, 11, 0.12);
      --danger-color: #ef4444;
      --danger-light: rgba(239, 68, 68, 0.12);
      --info-color: #00baff;
      --info-light: rgba(0, 186, 255, 0.12);
      --radius-sm: 12px;
      --radius-md: 20px;
      --radius-lg: 28px;
      --shadow-sm: 0 8px 20px rgba(15, 23, 42, 0.06);
      --shadow-md: 0 20px 48px rgba(15, 23, 42, 0.08);
      --shadow-focus: 0 0 0 4px var(--primary-light);
      --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      color: var(--text-primary);
      background: var(--bg-page);
      font-family: var(--font-family);
      overflow: hidden;
    }

    body {
      background-image: var(--bg-page-gradient);
      background-attachment: fixed;
    }

    button,
    input,
    select {
      font: inherit;
    }

    input[type="checkbox"] {
      accent-color: var(--primary-color);
    }

    .hidden {
      display: none !important;
    }

    .optimizer-app {
      width: 100%;
      height: 100%;
      overflow: hidden;
      padding: 20px;
    }

    .optimizer-shell {
      height: 100%;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .surface-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      backdrop-filter: blur(18px);
    }

    .app-overview {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 20px 22px;
    }

    .app-overview__intro {
      display: flex;
      align-items: center;
      gap: 16px;
      min-width: 0;
    }

    .app-overview__icon {
      width: 56px;
      height: 56px;
      border-radius: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--primary-color);
      background: linear-gradient(
        135deg,
        color-mix(in srgb, var(--primary-light) 78%, var(--bg-card-solid) 22%),
        color-mix(in srgb, var(--bg-card-solid) 88%, transparent 12%)
      );
      border: 1px solid color-mix(in srgb, var(--border-color-strong) 70%, transparent 30%);
      box-shadow: inset 0 1px 0 color-mix(in srgb, white 50%, transparent 50%);
      font-size: 24px;
      flex-shrink: 0;
    }

    .eyebrow {
      margin: 0 0 6px;
      color: var(--primary-color);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .app-overview__title {
      margin: 0;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .app-overview__subtitle {
      margin: 8px 0 0;
      color: var(--text-secondary);
      font-size: 14px;
      line-height: 1.6;
      max-width: 620px;
    }

    .app-overview__meta {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .meta-pill,
    .ghost-button,
    .viewer-toggle,
    .viewer-action,
    .preset-btn,
    .action-button,
    .secondary-button,
    .auth-button {
      border: 1px solid var(--border-color);
      border-radius: 999px;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease, background 0.18s ease, color 0.18s ease;
    }

    .meta-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: var(--bg-hover);
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 600;
    }

    .ghost-button {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 11px 16px;
      background: var(--bg-card-solid);
      color: var(--text-primary);
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      box-shadow: var(--shadow-sm);
    }

    .ghost-button:hover,
    .viewer-toggle:hover,
    .viewer-action:hover,
    .preset-btn:hover,
    .secondary-button:hover,
    .auth-button:hover {
      border-color: var(--primary-color);
      color: var(--primary-color);
      transform: translateY(-1px);
      box-shadow: 0 12px 28px rgba(15, 23, 42, 0.10);
    }

    .inline-banner {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 18px;
      border-radius: var(--radius-md);
    }

    .inline-banner__icon {
      width: 40px;
      height: 40px;
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--warning-light);
      color: var(--warning-color);
      font-size: 18px;
      flex-shrink: 0;
    }

    .inline-banner__copy {
      min-width: 0;
      flex: 1;
    }

    .inline-banner__title {
      margin: 0;
      font-size: 14px;
      font-weight: 700;
    }

    .inline-banner__desc {
      margin: 4px 0 0;
      color: var(--text-secondary);
      font-size: 13px;
    }

    .auth-form {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .workspace-grid {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(320px, 380px) minmax(0, 1fr);
      gap: 18px;
    }

    .control-column {
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow-y: auto;
      padding-right: 6px;
    }

    .control-column::-webkit-scrollbar {
      width: 8px;
    }

    .control-column::-webkit-scrollbar-thumb {
      background: color-mix(in srgb, var(--border-color-strong) 88%, transparent 12%);
      border-radius: 999px;
    }

    .viewer-column {
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .panel-section {
      padding: 18px;
      border-radius: var(--radius-lg);
    }

    .section-heading {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    .section-heading__main {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .section-icon {
      width: 40px;
      height: 40px;
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 18px;
      color: var(--primary-color);
      background: linear-gradient(
        135deg,
        color-mix(in srgb, var(--primary-light) 72%, var(--bg-card-solid) 28%),
        color-mix(in srgb, var(--bg-card-solid) 86%, transparent 14%)
      );
      border: 1px solid color-mix(in srgb, var(--border-color-strong) 72%, transparent 28%);
      box-shadow: inset 0 1px 0 color-mix(in srgb, white 46%, transparent 54%);
    }

    .section-heading h2,
    .viewer-card__header h2 {
      margin: 0;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .section-heading p,
    .viewer-card__header p {
      margin: 6px 0 0;
      color: var(--text-secondary);
      font-size: 13px;
      line-height: 1.6;
    }

    .drop-zone {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 168px;
      padding: 20px 18px;
      border: 1.5px dashed color-mix(in srgb, var(--primary-color) 40%, var(--border-color) 60%);
      border-radius: 24px;
      background:
        linear-gradient(
          180deg,
          color-mix(in srgb, var(--bg-card-solid) 82%, transparent 18%),
          color-mix(in srgb, var(--bg-secondary) 74%, var(--bg-card-solid) 26%)
        ),
        radial-gradient(circle at top left, var(--primary-light), transparent 38%);
      text-align: center;
      cursor: pointer;
      overflow: hidden;
    }

    .drop-zone:hover,
    .drop-zone.dragover {
      border-color: var(--primary-color);
      box-shadow: var(--shadow-focus);
      transform: translateY(-1px);
    }

    .drop-zone input {
      display: none;
    }

    .upload-alt-actions {
      display: flex;
      margin-top: 12px;
    }

    .upload-alt-button {
      width: 100%;
      justify-content: center;
    }

    .drop-zone__icon {
      width: 50px;
      height: 50px;
      border-radius: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(
        135deg,
        color-mix(in srgb, var(--primary-light) 78%, var(--bg-card-solid) 22%),
        color-mix(in srgb, var(--bg-card-solid) 92%, transparent 8%)
      );
      border: 1px solid color-mix(in srgb, var(--primary-color) 20%, var(--border-color) 80%);
      color: var(--primary-color);
      box-shadow:
        0 10px 24px color-mix(in srgb, var(--primary-color) 18%, transparent 82%),
        inset 0 1px 0 color-mix(in srgb, white 48%, transparent 52%);
      font-size: 22px;
    }

    .drop-zone__title {
      margin: 0;
      font-size: 16px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .drop-zone__subtitle {
      margin: 0;
      color: var(--text-secondary);
      font-size: 14px;
      line-height: 1.6;
      max-width: 280px;
    }

    .supported-formats {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 4px;
      color: var(--text-muted);
      font-size: 12px;
    }

    .file-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      max-width: 100%;
      padding: 10px 12px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--bg-card-solid) 88%, var(--bg-hover) 12%);
      border: 1px solid color-mix(in srgb, var(--border-color-strong) 68%, transparent 32%);
      color: var(--text-primary);
      font-size: 13px;
      font-weight: 600;
      box-shadow: var(--shadow-sm);
    }

    .file-chip span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .upload-selected {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-radius: 18px;
      border: 1px solid var(--border-color);
      background: var(--bg-hover);
    }

    .upload-selected__name {
      min-width: 0;
      font-size: 14px;
      font-weight: 700;
      color: var(--text-primary);
      word-break: break-word;
    }

    .icon-button {
      width: 38px;
      height: 38px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      border-radius: 999px;
      border: 1px solid var(--border-color);
      background: var(--bg-card-solid);
      color: var(--text-secondary);
      cursor: pointer;
      transition: transform 0.18s ease, border-color 0.18s ease, color 0.18s ease, box-shadow 0.18s ease;
    }

    .icon-button:hover {
      color: var(--danger-color);
      border-color: color-mix(in srgb, var(--danger-color) 40%, var(--border-color) 60%);
      transform: translateY(-1px);
      box-shadow: var(--shadow-sm);
    }

    .loading-box {
      display: none;
      align-items: center;
      gap: 12px;
      margin-top: 16px;
      padding: 14px 16px;
      border-radius: 18px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
    }

    .loading-box.show {
      display: flex;
    }

    .loading-copy {
      min-width: 0;
      flex: 1;
    }

    .loading-copy strong {
      display: block;
      font-size: 14px;
      font-weight: 700;
    }

    .loading-copy span {
      display: block;
      margin-top: 4px;
      color: var(--text-secondary);
      font-size: 12px;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid rgba(148, 163, 184, 0.35);
      border-top-color: var(--primary-color);
      border-radius: 999px;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }

    .preset-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }

    .preset-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 46px;
      padding: 10px 12px;
      background: var(--bg-card-solid);
      color: var(--text-primary);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }

    .preset-btn.active,
    .viewer-toggle.active,
    .viewer-action.active {
      color: var(--primary-color);
      border-color: color-mix(in srgb, var(--primary-color) 72%, var(--border-color) 28%);
      background: color-mix(in srgb, var(--primary-light) 54%, var(--bg-card-solid) 46%);
      box-shadow: var(--shadow-focus);
    }

    .preset-description,
    .helper-note {
      color: var(--text-secondary);
      font-size: 12px;
      line-height: 1.6;
    }

    .helper-note {
      padding: 12px 14px;
      border-radius: 16px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
    }

    .option-stack {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 14px;
    }

    .option-card {
      padding: 14px;
      border-radius: 18px;
      border: 1px solid var(--border-color);
      background: linear-gradient(
        180deg,
        color-mix(in srgb, var(--bg-card-solid) 90%, transparent 10%),
        color-mix(in srgb, var(--bg-hover) 78%, var(--bg-card-solid) 22%)
      );
    }

    .toggle-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .toggle-row input {
      margin-top: 3px;
      flex-shrink: 0;
    }

    .toggle-copy {
      min-width: 0;
      flex: 1;
    }

    .toggle-copy strong {
      display: block;
      font-size: 14px;
      font-weight: 700;
    }

    .toggle-copy span {
      display: block;
      margin-top: 4px;
      color: var(--text-secondary);
      font-size: 12px;
      line-height: 1.55;
    }

    .nested-options {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px dashed var(--border-color);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .nested-check {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-secondary);
      font-size: 13px;
    }

    .field-row {
      display: grid;
      grid-template-columns: 72px minmax(0, 1fr);
      align-items: center;
      gap: 10px;
    }

    .field-row label {
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 600;
    }

    .field-row--stack {
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .field-caption {
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 600;
    }

    .app-input,
    .app-select {
      width: 100%;
      min-height: 42px;
      padding: 10px 12px;
      color: var(--text-primary);
      background: var(--bg-card-solid);
      border: 1px solid var(--border-color-strong);
      border-radius: 14px;
      outline: none;
      transition: border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }

    #targetFaceCount {
      padding-right: 20px;
    }

    #targetFaceCount::-webkit-outer-spin-button,
    #targetFaceCount::-webkit-inner-spin-button {
      opacity: 1;
      width: 20px;
      min-height: 26px;
      margin: 0;
      transform: scale(1.35);
      transform-origin: center right;
      cursor: pointer;
    }

    .app-input:focus,
    .app-select:focus,
    .auth-input:focus {
      border-color: var(--primary-color);
      box-shadow: var(--shadow-focus);
    }

    .hint-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--success-color);
      background: var(--success-light);
      border: 1px solid color-mix(in srgb, var(--success-color) 22%, transparent 78%);
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 12px;
      font-weight: 700;
    }

    .action-button,
    .secondary-button,
    .auth-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      min-height: 48px;
      padding: 12px 16px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
    }

    .action-button {
      background: linear-gradient(135deg, var(--primary-color), var(--primary-hover));
      border-color: transparent;
      color: var(--text-inverse);
      box-shadow: 0 14px 32px rgba(0, 0, 0, 0.12);
    }

    .action-button:hover,
    .secondary-button:hover {
      transform: translateY(-1px);
      box-shadow: 0 18px 36px rgba(15, 23, 42, 0.14);
    }

    .action-button:disabled,
    .secondary-button:disabled,
    .auth-button:disabled {
      cursor: not-allowed;
      opacity: 0.6;
      transform: none;
      box-shadow: none;
    }

    .secondary-button {
      background: linear-gradient(135deg, var(--success-color), color-mix(in srgb, var(--success-color) 75%, #0f9f4a 25%));
      border-color: transparent;
      color: var(--text-inverse);
    }

    .auth-input {
      width: min(280px, 100%);
      min-height: 42px;
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid var(--border-color-strong);
      background: var(--bg-card-solid);
      color: var(--text-primary);
      outline: none;
    }

    .auth-button {
      width: auto;
      min-width: 110px;
      background: var(--bg-card-solid);
      color: var(--text-primary);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 14px;
    }

    .stat-card {
      padding: 14px;
      border-radius: 18px;
      border: 1px solid var(--border-color);
      background: linear-gradient(
        180deg,
        color-mix(in srgb, var(--bg-card-solid) 92%, transparent 8%),
        color-mix(in srgb, var(--bg-hover) 76%, var(--bg-card-solid) 24%)
      );
      min-height: 92px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 6px;
      text-align: center;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 800;
      color: var(--primary-color);
      line-height: 1.1;
      letter-spacing: -0.03em;
    }

    .stat-label {
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 600;
    }

    .timeline-list,
    #progressSteps {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .step-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 16px;
      border: 1px solid var(--border-color);
      background: var(--bg-hover);
      font-size: 13px;
    }

    .step-icon {
      width: 24px;
      height: 24px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 12px;
      font-weight: 700;
    }

    .step-icon--success {
      color: var(--success-color);
      background: var(--success-light);
    }

    .step-icon--warning {
      color: var(--warning-color);
      background: var(--warning-light);
    }

    .step-icon--danger {
      color: var(--danger-color);
      background: var(--danger-light);
    }

    .step-item__name {
      flex: 1;
      min-width: 0;
      font-weight: 600;
      color: var(--text-primary);
    }

    .step-item__meta {
      color: var(--text-secondary);
      font-size: 12px;
      white-space: nowrap;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .info-grid + .info-grid {
      margin-top: 10px;
    }

    .info-card {
      padding: 12px 14px;
      border-radius: 16px;
      border: 1px solid var(--border-color);
      background: var(--bg-hover);
    }

    .info-label {
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 600;
    }

    .info-value {
      margin-top: 6px;
      color: var(--text-primary);
      font-size: 14px;
      font-weight: 700;
      word-break: break-word;
    }

    .summary-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }

    .status-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      border: 1px solid transparent;
    }

    .status-chip--success {
      color: var(--success-color);
      background: var(--success-light);
      border-color: color-mix(in srgb, var(--success-color) 20%, transparent 80%);
    }

    .status-chip--warning {
      color: var(--warning-color);
      background: var(--warning-light);
      border-color: color-mix(in srgb, var(--warning-color) 24%, transparent 76%);
    }

    .status-chip--danger {
      color: var(--danger-color);
      background: var(--danger-light);
      border-color: color-mix(in srgb, var(--danger-color) 24%, transparent 76%);
    }

    .viewer-card {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .viewer-card__header {
      padding: 18px 20px 0;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      flex-wrap: wrap;
    }

    .viewer-toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .viewer-toolbar--side {
      justify-content: flex-start;
      margin-top: 4px;
    }

    .viewer-toolbar--preview {
      justify-content: flex-start;
      padding: 18px 20px 0;
    }

    .viewer-toolbar__spacer {
      flex: 1 1 auto;
      min-width: 0;
    }

    .viewer-toggle-group,
    .viewer-action-group {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px;
      border-radius: 999px;
      background: var(--bg-hover);
      border: 1px solid var(--border-color);
    }

    .viewer-toggle,
    .viewer-action {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 40px;
      padding: 0 14px;
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
    }

    .viewer-action--standalone {
      flex-shrink: 0;
      border-radius: 999px;
      background: var(--bg-hover);
      border: 1px solid var(--border-color);
    }

    .viewer-switch {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      border-radius: 999px;
      background: var(--bg-hover);
      border: 1px solid var(--border-color);
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 600;
    }

    .viewer-switch input {
      margin: 0;
    }

    .viewer-stage {
      flex: 1;
      min-height: 0;
      padding: 18px 20px 20px;
      display: flex;
    }

    .viewer-surface {
      flex: 1;
      min-height: 0;
      display: flex;
      overflow: hidden;
      border-radius: 24px;
      border: 1px solid var(--border-color);
      background: linear-gradient(180deg, var(--bg-stage), color-mix(in srgb, var(--bg-stage) 78%, var(--bg-card-solid) 22%));
      position: relative;
    }

    .viewer-panel {
      flex: 1 1 0%;
      position: relative;
      overflow: hidden;
      min-height: 420px;
    }

    .viewer-panel canvas {
      display: block;
    }

    .viewer-panel__label,
    .viewer-info {
      position: absolute;
      z-index: 5;
      left: 18px;
    }

    .viewer-panel__label {
      top: 18px;
    }

    .viewer-badge,
    .viewer-info-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.58);
      color: #f8fafc;
      backdrop-filter: blur(12px);
      font-size: 12px;
      font-weight: 700;
    }

    .viewer-info {
      bottom: 16px;
    }

    .viewer-divider {
      width: 2px;
      background: linear-gradient(180deg, transparent, var(--primary-color), transparent);
      cursor: col-resize;
      flex-shrink: 0;
    }

    .viewer-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
      color: var(--text-muted);
    }

    .viewer-placeholder__card {
      max-width: 280px;
      padding: 20px;
      border-radius: 24px;
      background: color-mix(in srgb, var(--bg-card-solid) 76%, transparent 24%);
      border: 1px solid color-mix(in srgb, var(--border-color-strong) 72%, transparent 28%);
      backdrop-filter: blur(10px);
    }

    .viewer-placeholder__card i {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 56px;
      height: 56px;
      border-radius: 18px;
      color: var(--primary-color);
      background: var(--primary-light);
      font-size: 24px;
      margin-bottom: 10px;
    }

    .viewer-placeholder__card--icon-only i {
      margin-bottom: 0;
    }

    .viewer-placeholder__card--icon-only {
      padding: 0;
      background: transparent;
      border: 0;
      box-shadow: none;
      backdrop-filter: none;
    }

    .viewer-placeholder__title {
      margin: 0;
      color: var(--text-primary);
      font-size: 16px;
      font-weight: 700;
    }

    .viewer-placeholder__desc {
      margin: 8px 0 0;
      color: var(--text-secondary);
      font-size: 13px;
      line-height: 1.6;
    }

    .feedback-banner {
      padding: 14px 16px;
      border-radius: 18px;
      border: 1px solid transparent;
      font-size: 13px;
      font-weight: 600;
      line-height: 1.6;
    }

    .feedback-banner--success {
      color: var(--success-color);
      background: var(--success-light);
      border-color: color-mix(in srgb, var(--success-color) 20%, transparent 80%);
    }

    .feedback-banner--danger {
      color: var(--danger-color);
      background: var(--danger-light);
      border-color: color-mix(in srgb, var(--danger-color) 20%, transparent 80%);
    }

    .inline-spinner {
      width: 14px;
      height: 14px;
      border-radius: 999px;
      border: 2px solid rgba(255, 255, 255, 0.35);
      border-top-color: rgba(255, 255, 255, 0.96);
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @media (max-width: 1200px) {
      .optimizer-app {
        padding: 16px;
        overflow: auto;
      }

      .workspace-grid {
        grid-template-columns: 1fr;
      }

      .viewer-column {
        min-height: 620px;
      }

      .control-column {
        overflow: visible;
        padding-right: 0;
      }
    }

    @media (max-width: 820px) {
      .optimizer-app {
        padding: 12px;
      }

      .optimizer-shell {
        gap: 14px;
      }

      .app-overview {
        padding: 18px;
        flex-direction: column;
        align-items: flex-start;
      }

      .app-overview__meta {
        width: 100%;
        justify-content: flex-start;
      }

      .panel-section,
      .viewer-stage {
        padding-left: 16px;
        padding-right: 16px;
      }

      .preset-grid,
      .stats-grid,
      .info-grid {
        grid-template-columns: 1fr;
      }

      .viewer-panel {
        min-height: 300px;
      }

      .viewer-stage {
        padding-bottom: 16px;
      }

      .viewer-toolbar {
        justify-content: flex-start;
      }
    }

    @media (max-width: 640px) {
      .app-overview__icon {
        width: 48px;
        height: 48px;
        border-radius: 16px;
      }

      .app-overview__title {
        font-size: 21px;
      }

      .viewer-toggle-group,
      .viewer-action-group {
        width: 100%;
        justify-content: space-between;
      }

      .viewer-toggle,
      .viewer-action {
        flex: 1;
        min-width: 0;
        padding: 0 10px;
      }

      .viewer-switch {
        width: 100%;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <div class="optimizer-app">

                <i class="bi bi-collection"></i>
                <span data-i18n="upload.pickFromLibrary"></span>
              </button>
            </div>
            <div class="loading-box" id="analyzeLoading">

              <div class="loading-copy">
                <strong data-i18n="analysis.loadingTitle"></strong>
                <span data-i18n="analysis.loadingSubtitle"></span>
              </div>
            </div>
          </section>

          <section class="surface-card panel-section hidden" id="modelInfoSection">
            <div class="section-heading">
              <div class="section-heading__main">
                <span class="section-icon"><i class="bi bi-clipboard-data"></i></span>
                <div>
                  <h2 data-i18n="modelInfo.title"></h2>
                </div>
              </div>
            </div>
            <div class="summary-chips hidden" id="summaryBadges"></div>
            <div class="info-grid" id="basicInfo"></div>
            <div class="info-grid hidden" id="meshInfo"></div>
          </section>

          <section class="surface-card panel-section hidden" id="optionsSection">
            <div class="section-heading">
              <div class="section-heading__main">
                <span class="section-icon"><i class="bi bi-sliders2"></i></span>
                <div>
                  <h2 data-i18n="options.title"></h2>
                </div>
              </div>
            </div>

            <div class="option-card">

                <input type="number" class="app-input" id="targetFaceCount" min="50000" step="50000">
              </label>
            </div>

            <div class="preset-grid hidden">
              <button class="preset-btn preset-btn--fast" data-preset="fast">

              </button>
              <button class="preset-btn preset-btn--balanced" data-preset="balanced">

              </button>

                    <strong data-i18n="options.clean.label"></strong>
                    <span data-i18n="options.clean.helper"></span>
                  </div>
                </label>
                <div class="nested-options">
                  <label class="nested-check" for="removeUnusedNodes">
                    <input type="checkbox" id="removeUnusedNodes" checked>
                    <span data-i18n="options.clean.nodes"></span>
                  </label>
                  <label class="nested-check" for="removeUnusedMaterials">
                    <input type="checkbox" id="removeUnusedMaterials" checked>
                    <span data-i18n="options.clean.materials"></span>
                  </label>
                  <label class="nested-check" for="removeUnusedTextures">
                    <input type="checkbox" id="removeUnusedTextures" checked>
                    <span data-i18n="options.clean.textures"></span>
                  </label>
                </div>
              </div>

              <div class="option-card">
                <label class="toggle-row" for="mergeEnabled">
                  <input type="checkbox" id="mergeEnabled">
                  <div class="toggle-copy">
                    <strong data-i18n="options.merge.label"></strong>
                    <span data-i18n="options.merge.helper"></span>
                  </div>
                </label>
              </div>

              <div class="option-card">
                <label class="toggle-row" for="simplifyEnabled">
                  <input type="checkbox" id="simplifyEnabled">

    const defaultRightPlaceholder = placeholderRight.innerHTML;

    const presetOptions = {
      fast: { clean: true, merge: false, simplify: false, quantize: false },
      balanced: { clean: true, merge: true, simplify: true, ratio: 0.75, quantize: false },
      maximum: { clean: true, merge: true, simplify: true, ratio: 0.5, quantize: false },
    };

    function normalizeLang(lang) {
      if (!lang) return DEFAULT_LANG;
      const normalized = lang.toLowerCase();
      if (normalized.startsWith('zh-tw')) return 'zh-TW';
      if (normalized.startsWith('zh')) return 'zh-CN';
      if (normalized.startsWith('en')) return 'en-US';
      if (normalized.startsWith('ja')) return 'ja-JP';
      if (normalized.startsWith('th')) return 'th-TH';
      return DEFAULT_LANG;
    }

    function getDictionary(lang = currentLang) {
      return I18N[lang] || I18N[DEFAULT_LANG];
    }

    function deepGet(obj, path) {
      return path.split('.').reduce((current, key) => (current && current[key] !== undefined ? current[key] : undefined), obj);
    }

    function interpolate(template, params = {}) {
      return String(template).replace(/\{(\w+)\}/g, (_, key) => params[key] ?? '');
    }

    function t(key, params = {}) {
      const message = deepGet(getDictionary(), key);
      if (message === undefined) return key;
      return typeof message === 'string' ? interpolate(message, params) : message;
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function setCssVar(name, value) {
      document.documentElement.style.setProperty(name, value);
    }

    function getSceneThemeConfig() {
      const isDark = Boolean(currentThemePalette?.dark);
      const isCyber = currentTheme === 'cyber-tech';
      return {
        background: currentThemePalette?.bgStage || '#edf3f8',
        gridMajor: isCyber ? '#2e5366' : isDark ? '#344b5e' : '#cbd5e1',
        gridMinor: isCyber ? '#1d3643' : isDark ? '#223241' : '#dbe3eb',
        ambientIntensity: isDark ? 0.9 : 0.7,
        keyLightIntensity: isDark ? 1.0 : 0.9,
        fillLightIntensity: isDark ? 0.45 : 0.3,
      };
    }

    function applySceneTheme(scene) {
      if (!scene) return;
      const sceneTheme = getSceneThemeConfig();
      scene.background = new THREE.Color(sceneTheme.background);

      const ambientLight = scene.userData?.ambientLight;
      if (ambientLight) {
        ambientLight.intensity = sceneTheme.ambientIntensity;
      }

      const primaryLight = scene.userData?.primaryLight;
      if (primaryLight) {
        primaryLight.intensity = sceneTheme.keyLightIntensity;
      }

      const secondaryLight = scene.userData?.secondaryLight;
      if (secondaryLight) {
        secondaryLight.intensity = sceneTheme.fillLightIntensity;
      }

      const gridHelper = scene.userData?.gridHelper;
      if (gridHelper) {
        const materials = Array.isArray(gridHelper.material)
          ? gridHelper.material
          : [gridHelper.material];
        if (materials[0]?.color) {
          materials[0].color.set(sceneTheme.gridMajor);
        }
        if (materials[1]?.color) {
          materials[1].color.set(sceneTheme.gridMinor);
        }
      }
    }

    function applyTheme(themeName = currentTheme, dark = currentDark) {
      const fallback = THEME_PRESETS['modern-blue'];
      const preset = THEME_PRESETS[themeName] || fallback;
      currentTheme = themeName in THEME_PRESETS ? themeName : 'modern-blue';
      currentDark = typeof dark === 'boolean' ? dark : preset.dark;

      const resolved = { ...fallback, ...preset, dark: currentDark };
      currentThemePalette = resolved;
      document.documentElement.dataset.theme = currentTheme;
      document.documentElement.dataset.mode = resolved.dark ? 'dark' : 'light';

      setCssVar('--primary-color', resolved.primary);
      setCssVar('--primary-hover', resolved.primaryHover);
      setCssVar('--primary-light', resolved.primaryLight);
      setCssVar('--text-primary', resolved.textPrimary);
      setCssVar('--text-secondary', resolved.textSecondary);
      setCssVar('--text-muted', resolved.textMuted);
      setCssVar('--bg-page', resolved.bgPage);
      setCssVar('--bg-page-gradient', resolved.bgPageGradient);
      setCssVar('--bg-card', resolved.bgCard);
      setCssVar('--bg-card-solid', resolved.bgCardSolid);
      setCssVar('--bg-hover', resolved.bgHover);
      setCssVar('--bg-active', resolved.bgActive);
      setCssVar('--bg-secondary', resolved.bgSecondary);
      setCssVar('--bg-stage', resolved.bgStage);
      setCssVar('--border-color', resolved.border);
      setCssVar('--border-color-strong', resolved.borderStrong);
      setCssVar('--success-color', resolved.success);
      setCssVar('--success-light', resolved.successLight);
      setCssVar('--warning-color', resolved.warning);
      setCssVar('--warning-light', resolved.warningLight);
      setCssVar('--danger-color', resolved.danger);
      setCssVar('--danger-light', resolved.dangerLight);
      setCssVar('--info-color', resolved.info);

    function sendPluginReady(force = false) {
      try {
        if (window.parent && window.parent !== window && (force || !window.__PLUGIN_READY_SENT__)) {
          if (!force) window.__PLUGIN_READY_SENT__ = true;
          window.parent.postMessage({ type: 'PLUGIN_READY', id: `ready-${Date.now()}` }, '*');
        }
      } catch (e) {}
    }

    function requestHost(action, payload = {}) {
      return new Promise((resolve, reject) => {
        if (!window.parent || window.parent === window) {
          reject(new Error(t('messages.openFromPlatform')));
          return;
        }

        const requestId = `request-${action}-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`;
        const timeoutId = window.setTimeout(() => {
          pendingHostRequests.delete(requestId);
          reject(new Error(t('messages.hostTimeout')));
        }, HOST_REQUEST_TIMEOUT_MS);

        pendingHostRequests.set(requestId, { resolve, reject, timeoutId });
        window.parent.postMessage({ type: 'REQUEST', id: requestId, payload: { action, ...payload } }, '*');
      });
    }

    function isRealFile(value) {
      return Boolean(
        value &&
        typeof value === 'object' &&
        typeof value.name === 'string' &&
        typeof value.size === 'number' &&
        typeof value.slice === 'function'
      );
    }

    function buildFileFromHostResult(result) {
      if (isRealFile(result?.file)) {
        return result.file;
      }

      const fileName =
        typeof result?.fileName === 'string' && result.fileName
          ? result.fileName
          : 'library-model.glb';
      const fileType =
        typeof result?.fileType === 'string' && result.fileType
          ? result.fileType
          : 'application/octet-stream';
      const fileLastModified = Number.isFinite(Number(result?.fileLastModified))
        ? Number(result.fileLastModified)
        : Date.now();

      if (result?.fileBuffer instanceof ArrayBuffer) {
        return new File([result.fileBuffer], fileName, {
          type: fileType,
          lastModified: fileLastModified,
        });
      }

      if (ArrayBuffer.isView(result?.fileBuffer)) {
        return new File([result.fileBuffer], fileName, {
          type: fileType,
          lastModified: fileLastModified,
        });
      }

      if (Array.isArray(result?.fileBuffer)) {
        return new File([new Uint8Array(result.fileBuffer)], fileName, {
          type: fileType,
          lastModified: fileLastModified,
        });
      }

      return null;
    }

    function getPlatformBaseUrl() {
      const candidates = [
        typeof platformConfig?.platformUrl === 'string' ? platformConfig.platformUrl : '',
        typeof platformConfig?.hostUrl === 'string' ? platformConfig.hostUrl : '',
        document.referrer || '',
      ].filter(Boolean);

      for (const candidate of candidates) {
        try {
          return new URL(candidate).origin;
        } catch (error) {}
      }

      return '';
    }

    function buildModelLibraryUrl() {
      const baseUrl = getPlatformBaseUrl();
      if (!baseUrl) return '';
      const targetUrl = new URL('/resource/polygen/index', baseUrl);
      if (currentLang) targetUrl.searchParams.set('lang', currentLang);
      if (currentTheme) targetUrl.searchParams.set('theme', currentTheme);
      return targetUrl.toString();
    }

    async function openModelLibrary() {
      try {
        await requestHost(HOST_OPEN_LIBRARY_ACTION, {
          path: '/resource/polygen/index',
          lang: currentLang,
          theme: currentTheme,
        });
      } catch (error) {
        const fallbackUrl = buildModelLibraryUrl();
        if (fallbackUrl) {
          window.open(fallbackUrl, '_blank', 'noopener');
          return;
        }
        showError(error instanceof Error ? error.message : t('messages.openFromPlatform'));
      }
    }

    async function selectModelFromLibrary() {
      setFeedback('', '');
      try {
        const result = await requestHost(HOST_PICK_RESOURCE_ACTION, {
          lang: currentLang,
          theme: currentTheme,
        });

        if (result?.cancelled) {
          return;
        }

        const file = buildFileFromHostResult(result);
        if (
          !file ||
          typeof file.name !== 'string' ||
          typeof file.size !== 'number' ||
          typeof file.slice !== 'function'
        ) {
          throw new Error(t('messages.requestFailed', { message: 'invalid file' }));
        }

        await handleFile(file);
      } catch (error) {
        showError(
          error instanceof Error
            ? error.message
            : t('messages.requestFailed', { message: 'unknown' })
        );
      }
    }

    window.addEventListener('message', (event) => {
      if (event.source !== window.parent) return;
      const { type, payload, requestId } = event.data || {};
      if (type === 'INIT') {
        platformConfig = payload?.config || {};
      } else if (type === 'THEME_CHANGE') {
        applyTheme(payload?.theme || currentTheme, Boolean(payload?.dark));
      } else if (type === 'LANG_CHANGE') {
        applyI18n(payload?.lang || currentLang);
      } else if (type === 'RESPONSE' && requestId && pendingHostRequests.has(requestId)) {
        const pending = pendingHostRequests.get(requestId);
        pendingHostRequests.delete(requestId);
        window.clearTimeout(pending.timeoutId);
        if (payload?.ok) pending.resolve(payload.result || {});
        else pending.reject(new Error(payload?.error || t('messages.requestFailed', { message: 'unknown' })));
      }
    });

    function checkAuth() {
      fetch('/api/status/test-auth-check', { method: 'GET', headers: getAuthHeaders() })
        .then((res) => {
          if (res.status === 401) {
            document.getElementById('authBar').classList.remove('hidden');
            document.getElementById('apiKeyInput').value = apiKey;
          }
        })
        .catch(() => {});

    document.getElementById('saveApiKey').addEventListener('click', () => {
      apiKey = document.getElementById('apiKeyInput').value;
      localStorage.setItem('api_key', apiKey);
      document.getElementById('authBar').classList.add('hidden');
    });

    function getAuthHeaders() {
      return apiKey ? { 'x-api-key': apiKey } : {};
    }

    function createScene(container) {
      const sceneTheme = getSceneThemeConfig();
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(sceneTheme.background);
      const ambientLight = new THREE.AmbientLight(0xffffff, sceneTheme.ambientIntensity);
      scene.add(ambientLight);
      const d1 = new THREE.DirectionalLight(0xffffff, sceneTheme.keyLightIntensity); d1.position.set(5, 10, 7); scene.add(d1);
      const d2 = new THREE.DirectionalLight(0xffffff, sceneTheme.fillLightIntensity); d2.position.set(-5, -5, -5); scene.add(d2);
      const gridHelper = new THREE.GridHelper(10, 20, new THREE.Color(sceneTheme.gridMajor), new THREE.Color(sceneTheme.gridMinor));
      gridHelper.userData.hideInThumbnail = true;
      scene.add(gridHelper);
      scene.userData.ambientLight = ambientLight;
      scene.userData.primaryLight = d1;
      scene.userData.secondaryLight = d2;
      scene.userData.gridHelper = gridHelper;
      const camera = new THREE.PerspectiveCamera(45, 1, 0.01, 1000);
      camera.position.set(3, 2, 3);
      const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.0;
      renderer.domElement.style.display = 'block';
      renderer.domElement.style.width = '100%';
      renderer.domElement.style.height = '100%';
      container.appendChild(renderer.domElement);
      const w = container.clientWidth || 400;
      const h = container.clientHeight || 400;
      renderer.setSize(w, h, false);
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.05;
      return { scene, camera, renderer, controls };
    }

    function initViewers() {
      const lp = document.getElementById('viewerLeft');
      const rp = document.getElementById('viewerRight');
      const l = createScene(lp);
      leftScene = l.scene;
      leftCamera = l.camera;
      leftRenderer = l.renderer;
      leftControls = l.controls;
      const r = createScene(rp);
      rightScene = r.scene;
      rightCamera = r.camera;
      rightRenderer = r.renderer;
      rightControls = r.controls;
      let syncing = false;
      leftControls.addEventListener('change', () => {
        if (syncing || !document.getElementById('syncCameras').checked) return;
        syncing = true;
        rightCamera.position.copy(leftCamera.position);
        rightCamera.rotation.copy(leftCamera.rotation);
        rightControls.target.copy(leftControls.target);
        rightControls.update();
        syncing = false;
      });
      rightControls.addEventListener('change', () => {
        if (syncing || !document.getElementById('syncCameras').checked) return;
        syncing = true;
        leftCamera.position.copy(rightCamera.position);
        leftCamera.rotation.copy(rightCamera.rotation);
        leftControls.target.copy(rightControls.target);
        leftControls.update();
        syncing = false;
      });
      const ro = new ResizeObserver(() => onResize());
      ro.observe(lp);
      ro.observe(rp);
      requestAnimationFrame(() => { onResize(); animate(); });
    }

    function animate() {
      requestAnimationFrame(animate);
      leftControls.update();
      rightControls.update();
      leftRenderer.render(leftScene, leftCamera);
      rightRenderer.render(rightScene, rightCamera);
    }

    function onResize() {
      const lp = document.getElementById('viewerLeft');
      const rp = document.getElementById('viewerRight');
      if (leftRenderer && lp.clientWidth > 0 && lp.clientHeight > 0) {
        leftCamera.aspect = lp.clientWidth / lp.clientHeight;
        leftCamera.updateProjectionMatrix();
        leftRenderer.setSize(lp.clientWidth, lp.clientHeight, false);
      }
      if (rightRenderer && rp.clientWidth > 0 && rp.clientHeight > 0) {
        rightCamera.aspect = rp.clientWidth / rp.clientHeight;
        rightCamera.updateProjectionMatrix();
        rightRenderer.setSize(rp.clientWidth, rp.clientHeight, false);
      }
    }

    window.addEventListener('resize', onResize);

    function updateMeshInfoBadge(side, triangles, vertices) {
      document.getElementById(side === 'left' ? 'infoLeft' : 'infoRight').textContent = `△ ${Math.round(triangles).toLocaleString()} · ⬡ ${Math.round(vertices).toLocaleString()}`;
    }

    function loadModelFromFile(file, scene, side) {
      return new Promise((resolve, reject) => {
        const url = URL.createObjectURL(file);
        const ext = file.name.split('.').pop().toLowerCase();
        const onLoad = (obj) => {
          const model = obj.scene || obj;
          const box = new THREE.Box3().setFromObject(model);
          const center = box.getCenter(new THREE.Vector3());
          const size = box.getSize(new THREE.Vector3());
          const maxDim = Math.max(size.x, size.y, size.z, 0.0001);
          const scale = 3 / maxDim;
          model.userData.originalBounds = {
            size: { x: size.x, y: size.y, z: size.z },
            center: { x: center.x, y: center.y, z: center.z },
          };
          model.userData.animations = Array.isArray(obj.animations) ? obj.animations : [];
          model.scale.setScalar(scale);
          model.position.sub(center.multiplyScalar(scale));
          model.position.y -= box.min.y * scale;
          scene.add(model);
          let tris = 0;
          let verts = 0;
          model.traverse((child) => {
            if (child.isMesh && child.geometry) {
              const geometry = child.geometry;
              tris += geometry.index ? geometry.index.count / 3 : (geometry.attributes.position?.count || 0) / 3;
              verts += geometry.attributes.position?.count || 0;
            }
          });
          model.userData.meshStats = {
            faces: Math.round(tris),
            vertices: Math.round(verts),
          };
          updateMeshInfoBadge(side, tris, verts);
          URL.revokeObjectURL(url);
          resolve(model);
        };

        if (ext === 'glb' || ext === 'gltf') {
          const loader = new GLTFLoader();
          const dl = new DRACOLoader();
          dl.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.6/');
          loader.setDRACOLoader(dl);
          loader.load(url, onLoad, undefined, reject);
        } else if (ext === 'obj') {
          new OBJLoader().load(url, (obj) => {
            obj.traverse((child) => {
              if (child.isMesh) {
                child.material = new THREE.MeshStandardMaterial({ color: 0x8b97a8, roughness: 0.62, metalness: 0.18 });
              }
            });
            onLoad(obj);
          }, undefined, reject);
        } else if (ext === 'stl') {
          new STLLoader().load(url, (geo) => {
            geo.computeVertexNormals();
            const mesh = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ color: 0x8b97a8, roughness: 0.62, metalness: 0.18 }));
            const group = new THREE.Group();
            group.add(mesh);
            onLoad(group);
          }, undefined, reject);
        } else if (ext === 'usdz') {
          const reader = new FileReader();
          reader.onload = () => {
            try {
              const loader = new USDZLoader();
              const group = loader.parse(reader.result);
              group.traverse((child) => {
                if (child.isMesh && !child.material) {
                  child.material = new THREE.MeshStandardMaterial({ color: 0x8b97a8, roughness: 0.62, metalness: 0.18 });
                }
              });
              onLoad(group);
            } catch (error) {
              reject(error);
            }
          };
          reader.onerror = reject;
          reader.readAsArrayBuffer(file);
          URL.revokeObjectURL(url);
          return;
        } else {
          URL.revokeObjectURL(url);
          reject(new Error('Format not supported for preview'));
        }
      });
    }

    function loadModelFromUrl(url, scene, side) {
      return new Promise((resolve, reject) => {
        const loader = new GLTFLoader();
        const dl = new DRACOLoader();
        dl.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.6/');
        loader.setDRACOLoader(dl);
        loader.load(url, (gltf) => {
          const model = gltf.scene;
          const box = new THREE.Box3().setFromObject(model);
          const center = box.getCenter(new THREE.Vector3());
          const size = box.getSize(new THREE.Vector3());
          const maxDim = Math.max(size.x, size.y, size.z, 0.0001);
          const scale = 3 / maxDim;
          model.userData.originalBounds = {
            size: { x: size.x, y: size.y, z: size.z },
            center: { x: center.x, y: center.y, z: center.z },
          };
          model.userData.animations = Array.isArray(gltf.animations) ? gltf.animations : [];
          model.scale.setScalar(scale);
          model.position.sub(center.multiplyScalar(scale));
          model.position.y -= box.min.y * scale;
          scene.add(model);
          let tris = 0;
          let verts = 0;
          model.traverse((child) => {
            if (child.isMesh && child.geometry) {
              const geometry = child.geometry;
              tris += geometry.index ? geometry.index.count / 3 : (geometry.attributes.position?.count || 0) / 3;
              verts += geometry.attributes.position?.count || 0;
            }
          });
          model.userData.meshStats = {
            faces: Math.round(tris),
            vertices: Math.round(verts),
          };
          updateMeshInfoBadge(side, tris, verts);
          resolve(model);
        }, undefined, reject);
      });
    }

    function clearModel(scene, model) {
      if (!model) return null;
      scene.remove(model);
      model.traverse((child) => {
        if (child.geometry) child.geometry.dispose();
        if (child.material) {
          if (Array.isArray(child.material)) child.material.forEach((material) => material.dispose());
          else child.material.dispose();
        }
      });
      return null;
    }

    function fitCamera(camera, controls, model) {
      if (!model) return;
      const box = new THREE.Box3().setFromObject(model);
      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());
      const dist = Math.max(size.x, size.y, size.z) * 1.5;
      camera.position.set(center.x + dist, center.y + dist * 0.6, center.z + dist);
      controls.target.copy(center);
      controls.update();
    }

    function toggleWireframe(model, enabled) {
      if (!model) return;
      model.traverse((child) => {
        if (child.isMesh && child.material) {
          const materials = Array.isArray(child.material) ? child.material : [child.material];
          materials.forEach((material) => {
            material.wireframe = enabled;
          });
        }
      });
    }

    function setViewMode(mode) {
      viewMode = mode;
      const left = document.getElementById('viewerLeft');
      const right = document.getElementById('viewerRight');
      const divider = document.getElementById('viewerDivider');
      document.querySelectorAll('.viewer-toggle').forEach((button) => button.classList.remove('active'));
      if (mode === 'split') {
        left.style.display = '';
        right.style.display = '';
        divider.style.display = '';
        document.getElementById('btnSplit').classList.add('active');

        left.style.display = '';
        right.style.display = 'none';
        divider.style.display = 'none';
        document.getElementById('btnOriginal').classList.add('active');
      } else {
        left.style.display = 'none';
        right.style.display = '';
        divider.style.display = 'none';
        document.getElementById('btnOptimized').classList.add('active');
      }
      setTimeout(onResize, 50);
    }

    document.getElementById('btnOptimized').addEventListener('click', () => setViewMode('optimized'));
    document.getElementById('btnWireframe').addEventListener('click', function() {

      toggleWireframe(leftModel, wireframeMode);
      toggleWireframe(rightModel, wireframeMode);
